name: "Security & Standards"

on:
  workflow_call:
    inputs:
      php_versions:
        description: "JSON array of PHP versions."
        required: false
        type: string
        default: '["8.3","8.4","8.5"]'
      dependency_versions:
        description: "JSON array of Composer dependency modes."
        required: false
        type: string
        default: '["prefer-lowest","prefer-stable"]'
      php_extensions:
        description: "Comma-separated PHP extensions for shivammathur/setup-php."
        required: false
        type: string
        default: ""
      coverage:
        description: "Coverage driver for shivammathur/setup-php."
        required: false
        type: string
        default: "none"
      composer_flags:
        description: "Extra flags appended to composer install/update."
        required: false
        type: string
        default: ""
      phpstan_memory_limit:
        description: "PHPStan memory limit."
        required: false
        type: string
        default: "1G"
      psalm_threads:
        description: "Psalm thread count."
        required: false
        type: string
        default: "1"
      run_analysis:
        description: "Run SARIF security/code-scanning analysis job."
        required: false
        type: boolean
        default: true
      run_svg_report:
        description: "Generate SVG security report artifacts."
        required: false
        type: boolean
        default: true
      artifact_retention_days:
        description: "Retention days for uploaded report artifacts."
        required: false
        type: number
        default: 61

jobs:
  prepare:
    name: Prepare CI matrix
    runs-on: ubuntu-latest
    outputs:
      php_versions: ${{ steps.matrix.outputs.php_versions }}
      dependency_versions: ${{ steps.matrix.outputs.dependency_versions }}
    steps:
      - name: Define shared matrix values
        id: matrix
        run: |
          echo 'php_versions=${{ inputs.php_versions }}' >> "$GITHUB_OUTPUT"
          echo 'dependency_versions=${{ inputs.dependency_versions }}' >> "$GITHUB_OUTPUT"

  run:
    needs: prepare
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [ "ubuntu-latest" ]
        php-versions: ${{ fromJson(needs.prepare.outputs.php_versions) }}
        dependency-version: ${{ fromJson(needs.prepare.outputs.dependency_versions) }}

    name: Code Analysis - PHP ${{ matrix.php-versions }} - ${{ matrix.dependency-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: composer:v2
          extensions: ${{ inputs.php_extensions }}
          coverage: ${{ inputs.coverage }}

      - name: Check PHP Version
        run: php -v

      - name: Validate Composer
        run: composer validate --strict

      - name: Resolve dependencies (${{ matrix.dependency-version }})
        run: composer update --no-interaction --prefer-dist --no-progress --${{ matrix.dependency-version }} ${{ inputs.composer_flags }}

      - name: Test
        env:
          IC_PHPSTAN_MEMORY_LIMIT: ${{ inputs.phpstan_memory_limit }}
          IC_PSALM_THREADS: ${{ inputs.psalm_threads }}
        run: |
          if [ "${{ matrix.dependency-version }}" != "prefer-lowest" ]; then
            composer ic:ci
          else
            if composer run-script --list 2>/dev/null | grep -qE '^[[:space:]]*ic:ci[[:space:]]'; then
              composer ic:ci -- --prefer-lowest
            else
              composer ic:ci --prefer-lowest
            fi
          fi

  analyze:
    needs: prepare
    if: inputs.run_analysis
    name: Security Analysis - PHP ${{ matrix.php-versions }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: ${{ fromJson(needs.prepare.outputs.php_versions) }}
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: composer:v2
          extensions: ${{ inputs.php_extensions }}
          coverage: ${{ inputs.coverage }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress ${{ inputs.composer_flags }}

      - name: Composer Audit
        id: composer_audit
        run: composer ic:release:audit
        continue-on-error: true

      - name: Quality Gate (PHPStan)
        id: quality_gate
        env:
          IC_PHPSTAN_MEMORY_LIMIT: ${{ inputs.phpstan_memory_limit }}
        run: composer ic:test:static
        continue-on-error: true

      - name: Security Gate (Psalm)
        id: security_gate
        env:
          IC_PSALM_THREADS: ${{ inputs.psalm_threads }}
        run: composer ic:test:security
        continue-on-error: true

      - name: Run PHPStan (Code Scanning)
        id: phpstan_scan
        run: |
          VENDOR_DIR="$(composer config vendor-dir)"
          PHPSTAN_CONFIG="$VENDOR_DIR/infocyph/phpforge/phpstan.neon.dist"

          if [ -f "phpstan.neon.dist" ]; then
            PHPSTAN_CONFIG="phpstan.neon.dist"
          fi

          PHPSTAN_ARGS=(analyse --configuration="$PHPSTAN_CONFIG" --memory-limit="${{ inputs.phpstan_memory_limit }}" --no-progress --error-format=json)
          if [ "$PHPSTAN_CONFIG" != "phpstan.neon.dist" ] && [ -d "src" ]; then
            PHPSTAN_ARGS+=(src)
          fi

          php "$VENDOR_DIR/bin/phpstan" "${PHPSTAN_ARGS[@]}" > phpstan-results.json || true
          composer ic:phpstan:sarif -- phpstan-results.json phpstan-results.sarif
        continue-on-error: true

      - name: Upload PHPStan Results
        id: upload_phpstan
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: phpstan-results.sarif
          category: "phpstan-${{ matrix.php-versions }}"
        if: always() && hashFiles('phpstan-results.sarif') != ''

      - name: Run Psalm Security Scan
        id: psalm_scan
        run: |
          VENDOR_DIR="$(composer config vendor-dir)"
          PSALM_CONFIG="$VENDOR_DIR/infocyph/phpforge/psalm.xml"
          if [ -f "psalm.xml" ]; then
            PSALM_CONFIG="psalm.xml"
          fi

          php "$VENDOR_DIR/bin/psalm" --config="$PSALM_CONFIG" --security-analysis --threads="${{ inputs.psalm_threads }}" --report=psalm-results.sarif || true
        continue-on-error: true

      - name: Upload Psalm Results
        id: upload_psalm
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: psalm-results.sarif
          category: "psalm-${{ matrix.php-versions }}"
        if: always() && hashFiles('psalm-results.sarif') != ''

      - name: Enforce analysis gates
        if: always()
        shell: bash
        run: |
          failures=()

          if [ "${{ steps.composer_audit.outcome }}" != "success" ]; then
            failures+=("composer audit")
          fi

          if [ "${{ steps.quality_gate.outcome }}" != "success" ]; then
            failures+=("phpstan quality gate")
          fi

          if [ "${{ steps.security_gate.outcome }}" != "success" ]; then
            failures+=("psalm security gate")
          fi

          if [ "${#failures[@]}" -gt 0 ]; then
            echo "::error::Security analysis checks failed: ${failures[*]}"
            exit 1
          fi

  svg-report:
    needs:
      - run
      - analyze
    if: always() && inputs.run_svg_report && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    name: Security SVG Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve report PHP version
        id: report_php
        shell: bash
        run: |
          php_version="$(jq -r 'if type == "array" and length > 0 then .[-1] else empty end' <<< '${{ inputs.php_versions }}')"

          if [ -z "$php_version" ] || [ "$php_version" = "null" ]; then
            php_version="8.5"
          fi

          echo "php_version=${php_version}" >> "$GITHUB_OUTPUT"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ steps.report_php.outputs.php_version }}
          tools: composer:v2
          extensions: ${{ inputs.php_extensions }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress ${{ inputs.composer_flags }}

      - name: Run benchmark
        id: benchmark
        shell: bash
        run: |
          mkdir -p .phpforge-report/out
          benchmark_result="skipped"
          benchmark_command="none"

          if composer list --raw 2>/dev/null | awk '{print $1}' | grep -q '^ic:bench:quick$'; then
            benchmark_command="ic:bench:quick"
          elif composer list --raw 2>/dev/null | awk '{print $1}' | grep -q '^ic:test:bench$'; then
            benchmark_command="ic:test:bench"
          fi

          if [ "$benchmark_command" = "none" ]; then
            echo "No benchmark command found (expected ic:bench:quick or ic:test:bench)." | tee .phpforge-report/out/benchmark.log
          else
            set +e
            composer "$benchmark_command" | tee .phpforge-report/out/benchmark.log
            command_exit_code=$?
            set -e

            if [ "$command_exit_code" -eq 0 ]; then
              benchmark_result="success"
            else
              benchmark_result="failure"
            fi
          fi

          echo "benchmark_result=${benchmark_result}" >> "$GITHUB_OUTPUT"
          echo "benchmark_command=${benchmark_command}" >> "$GITHUB_OUTPUT"

      - name: Build SVG report artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p .phpforge-report/out

          run_result="${{ needs.run.result }}"
          analyze_result="${{ needs.analyze.result }}"
          benchmark_result="${{ steps.benchmark.outputs.benchmark_result }}"
          benchmark_command="${{ steps.benchmark.outputs.benchmark_command }}"
          benchmark_php_version="${{ steps.report_php.outputs.php_version }}"
          generated_at="$(date -u +"%Y-%m-%d %H:%M UTC")"
          jobs_api_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs?per_page=100"

          overall_state="failing"

          if [ "$run_result" = "success" ] && [ "$analyze_result" = "success" ]; then
            overall_state="passing"
          elif [ "$run_result" = "success" ] && [ "$analyze_result" = "skipped" ]; then
            overall_state="partial"
          fi

          php_versions_input='${{ inputs.php_versions }}'

          if ! jq -e 'type == "array"' >/dev/null 2>&1 <<< "$php_versions_input"; then
            php_versions_input='[]'
          fi

          jobs_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$jobs_api_url" || echo '{"jobs":[]}'
          )"

          version_matrix_file=".phpforge-report/out/version-matrix.ndjson"
          : > "$version_matrix_file"

          while IFS= read -r php_version; do
            [ -z "$php_version" ] && continue

            code_analysis_prefer_lowest="$(jq -r --arg name "Code Analysis - PHP ${php_version} - prefer-lowest" '.jobs // [] | map(select(.name == $name)) | first | .conclusion // "missing"' <<< "$jobs_json")"
            code_analysis_prefer_stable="$(jq -r --arg name "Code Analysis - PHP ${php_version} - prefer-stable" '.jobs // [] | map(select(.name == $name)) | first | .conclusion // "missing"' <<< "$jobs_json")"
            security_analysis="$(jq -r --arg name "Security Analysis - PHP ${php_version}" '.jobs // [] | map(select(.name == $name)) | first | .conclusion // "missing"' <<< "$jobs_json")"

            if [ "$analyze_result" = "skipped" ] && [ "$security_analysis" = "missing" ]; then
              security_analysis="skipped"
            fi

            jq -nc \
              --arg php_version "$php_version" \
              --arg code_analysis_prefer_lowest "$code_analysis_prefer_lowest" \
              --arg code_analysis_prefer_stable "$code_analysis_prefer_stable" \
              --arg security_analysis "$security_analysis" \
              '{
                php_version: $php_version,
                code_analysis_prefer_lowest: $code_analysis_prefer_lowest,
                code_analysis_prefer_stable: $code_analysis_prefer_stable,
                security_analysis: $security_analysis
              }' >> "$version_matrix_file"
          done < <(jq -r '.[]' <<< "$php_versions_input")

          matrix_results_json="$(jq -sc '.' "$version_matrix_file")"

          package_version() {
            local package_name="$1"
            local version
            version="$(composer show "$package_name" --format=json 2>/dev/null | jq -r '.versions[0] // .version // empty' || true)"

            if [ -z "$version" ]; then
              version="not-installed"
            fi

            echo "$version"
          }

          tools_json="$(jq -nc \
            --arg captainhook "$(package_version 'captainhook/captainhook')" \
            --arg composer_normalize "$(package_version 'ergebnis/composer-normalize')" \
            --arg pest "$(package_version 'pestphp/pest')" \
            --arg pint "$(package_version 'laravel/pint')" \
            --arg phpcs "$(package_version 'squizlabs/php_codesniffer')" \
            --arg phpstan "$(package_version 'phpstan/phpstan')" \
            --arg psalm "$(package_version 'vimeo/psalm')" \
            --arg rector "$(package_version 'rector/rector')" \
            --arg phpbench "$(package_version 'phpbench/phpbench')" \
            '[
              {name: "CaptainHook", package: "captainhook/captainhook", version: $captainhook},
              {name: "Composer Normalize", package: "ergebnis/composer-normalize", version: $composer_normalize},
              {name: "Pest", package: "pestphp/pest", version: $pest},
              {name: "Pint", package: "laravel/pint", version: $pint},
              {name: "PHP_CodeSniffer", package: "squizlabs/php_codesniffer", version: $phpcs},
              {name: "PHPStan", package: "phpstan/phpstan", version: $phpstan},
              {name: "Psalm", package: "vimeo/psalm", version: $psalm},
              {name: "Rector", package: "rector/rector", version: $rector},
              {name: "PHPBench", package: "phpbench/phpbench", version: $phpbench}
            ]'
          )"

          echo "$tools_json" > .phpforge-report/out/tool-versions.json

          jq -n \
            --arg generated_at "$generated_at" \
            --arg overall_state "$overall_state" \
            --arg run_result "$run_result" \
            --arg analyze_result "$analyze_result" \
            --argjson tested_php_versions "$php_versions_input" \
            --argjson matrix_results "$matrix_results_json" \
            --arg benchmark_result "$benchmark_result" \
            --arg benchmark_command "$benchmark_command" \
            --arg benchmark_php_version "$benchmark_php_version" \
            --argjson tools "$tools_json" \
            '{
              generated_at: $generated_at,
              overall_state: $overall_state,
              run_result: $run_result,
              analyze_result: $analyze_result,
              tested_php_versions: $tested_php_versions,
              matrix_results: $matrix_results,
              benchmark_result: $benchmark_result,
              benchmark_command: $benchmark_command,
              benchmark_php_version: $benchmark_php_version,
              tools: $tools
            }' > .phpforge-report/out/security-summary.json

          status_label() {
            case "$1" in
              success) echo "PASS" ;;
              failure) echo "FAIL" ;;
              cancelled) echo "CANCELLED" ;;
              skipped) echo "SKIPPED" ;;
              *) echo "${1^^}" ;;
            esac
          }

          status_class() {
            case "$1" in
              success) echo "ok" ;;
              failure|cancelled|timed_out|action_required) echo "fail" ;;
              info) echo "info" ;;
              *) echo "warn" ;;
            esac
          }

          rows_svg=""
          y=118
          benchmark_label="Benchmark quick pass"

          if [ "$benchmark_command" = "ic:test:bench" ]; then
            benchmark_label="Benchmark aggregate pass"
          elif [ "$benchmark_command" = "none" ]; then
            benchmark_label="Benchmark unavailable"
          fi

          append_row() {
            local label="$1"
            local status="$2"
            local css_class="$3"

            rows_svg="${rows_svg}  <text x=\"28\" y=\"${y}\" class=\"label\">${label}</text>"$'\n'
            rows_svg="${rows_svg}  <text x=\"542\" y=\"${y}\" text-anchor=\"end\" class=\"${css_class}\">${status}</text>"$'\n'
            y=$((y + 22))
          }

          append_row "Pipeline matrix checks" "$(status_label "$run_result")" "$(status_class "$run_result")"
          append_row "Security analysis job" "$(status_label "$analyze_result")" "$(status_class "$analyze_result")"
          append_row "${benchmark_label} (PHP ${benchmark_php_version})" "$(status_label "$benchmark_result")" "$(status_class "$benchmark_result")"

          while IFS=$'\t' read -r php_version lowest stable security; do
            append_row "PHP ${php_version} CI prefer-lowest" "$(status_label "$lowest")" "$(status_class "$lowest")"
            append_row "PHP ${php_version} CI prefer-stable" "$(status_label "$stable")" "$(status_class "$stable")"
            append_row "PHP ${php_version} Security analysis" "$(status_label "$security")" "$(status_class "$security")"
          done < <(jq -r '.[] | [.php_version, .code_analysis_prefer_lowest, .code_analysis_prefer_stable, .security_analysis] | @tsv' <<< "$matrix_results_json")

          while IFS=$'\t' read -r tool_name tool_version; do
            append_row "Tool: ${tool_name}" "$tool_version" "info"
          done < <(jq -r '.[] | [.name, .version] | @tsv' <<< "$tools_json")

          total_height=$((y + 24))

          cat > .phpforge-report/out/security-report.svg <<SVG
          <svg xmlns="http://www.w3.org/2000/svg" width="580" height="${total_height}" role="img" aria-label="Security report summary">
            <style>
              .title { font: 700 20px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #111827; }
              .meta { font: 12px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #374151; }
              .label { font: 13px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #111827; }
              .ok { font: 700 12px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #166534; }
              .warn { font: 700 12px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #9a6700; }
              .fail { font: 700 12px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #b42318; }
              .info { font: 700 12px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #1f4e79; }
            </style>
            <rect x="0.5" y="0.5" width="579" height="$((total_height - 1))" rx="10" fill="#f8fafc" stroke="#d0d7de"/>
            <rect x="16" y="16" width="548" height="66" rx="8" fill="#eef2ff"/>
            <text x="28" y="44" class="title">Security &amp; Standards Report</text>
            <text x="28" y="66" class="meta">Generated: ${generated_at} | Overall: ${overall_state}</text>
          ${rows_svg}</svg>
          SVG

          {
            tested_versions="$(jq -r 'if length > 0 then join(", ") else "none" end' <<< "$php_versions_input")"
            tool_versions="$(jq -r 'map("\(.name) (\(.version))") | join(", ")' <<< "$tools_json")"
            echo "### Security SVG Report"
            echo ""
            echo "- Overall: \`${overall_state}\`"
            echo "- Run matrix: \`${run_result}\`"
            echo "- Analysis job: \`${analyze_result}\`"
            echo "- Tested PHP versions: \`${tested_versions}\`"
            echo "- Benchmark: \`${benchmark_result}\` (command: ${benchmark_command}, PHP ${benchmark_php_version})"
            echo "- Tools: ${tool_versions}"
            echo "- Artifacts: \`security-report.svg\`, \`security-summary.json\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload security report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-svg-report
          path: |
            .phpforge-report/out/security-report.svg
            .phpforge-report/out/security-summary.json
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error
