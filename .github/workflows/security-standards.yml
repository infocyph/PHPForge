name: "Security & Standards"

on:
  workflow_call:
    inputs:
      php_versions:
        description: "JSON array of PHP versions."
        required: false
        type: string
        default: '["8.2","8.3","8.4","8.5"]'
      dependency_versions:
        description: "JSON array of Composer dependency modes."
        required: false
        type: string
        default: '["prefer-lowest","prefer-stable"]'
      php_extensions:
        description: "Comma-separated PHP extensions for shivammathur/setup-php."
        required: false
        type: string
        default: ""
      composer_flags:
        description: "Extra flags appended to composer install/update."
        required: false
        type: string
        default: ""
      phpstan_memory_limit:
        description: "PHPStan memory limit."
        required: false
        type: string
        default: "1G"
      psalm_threads:
        description: "Psalm thread count."
        required: false
        type: string
        default: "1"
      run_analysis:
        description: "Run SARIF security/code-scanning analysis job."
        required: false
        type: boolean
        default: true
      run_svg_report:
        description: "Generate SVG security report artifacts."
        required: false
        type: boolean
        default: true
      fail_on_skipped_tests:
        description: "Treat skipped Pest tests as failures in the CI test job."
        required: false
        type: boolean
        default: false
      enable_redis_service:
        description: "Enable Redis service container for integration tests."
        required: false
        type: boolean
        default: false
      enable_valkey_service:
        description: "Enable Valkey service container for integration tests."
        required: false
        type: boolean
        default: false
      enable_memcached_service:
        description: "Enable Memcached service container for integration tests."
        required: false
        type: boolean
        default: false
      enable_postgres_service:
        description: "Enable PostgreSQL service container for integration tests."
        required: false
        type: boolean
        default: false
      enable_mysql_service:
        description: "Enable MySQL service container for integration tests."
        required: false
        type: boolean
        default: false
      enable_scylladb_service:
        description: "Enable ScyllaDB Alternator service container for integration tests."
        required: false
        type: boolean
        default: false
      enable_elasticsearch_service:
        description: "Enable Elasticsearch service container for integration tests."
        required: false
        type: boolean
        default: false
      enable_mongodb_service:
        description: "Enable MongoDB service container for integration tests."
        required: false
        type: boolean
        default: false
      service_db_name:
        description: "Shared database name used by service containers."
        required: false
        type: string
        default: "phpforge"
      service_db_user:
        description: "Shared username used by service containers."
        required: false
        type: string
        default: "phpforge"
      service_db_password:
        description: "Shared password used by service containers."
        required: false
        type: string
        default: "phpforge"
      artifact_retention_days:
        description: "Retention days for uploaded report artifacts."
        required: false
        type: number
        default: 61

jobs:
  prepare:
    name: Prepare CI matrix
    runs-on: ubuntu-latest
    outputs:
      php_versions: ${{ steps.matrix.outputs.php_versions }}
      dependency_versions: ${{ steps.matrix.outputs.dependency_versions }}
    steps:
      - name: Define shared matrix values
        id: matrix
        run: |
          echo 'php_versions=${{ inputs.php_versions }}' >> "$GITHUB_OUTPUT"
          echo 'dependency_versions=${{ inputs.dependency_versions }}' >> "$GITHUB_OUTPUT"

  run:
    needs: prepare
    runs-on: ${{ matrix.operating-system }}
    services:
      redis:
        image: ${{ inputs.enable_redis_service && 'redis:7-alpine' || '' }}
        command: --requirepass ${{ inputs.service_db_password }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a ${{ inputs.service_db_password }} ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      valkey:
        image: ${{ inputs.enable_valkey_service && 'valkey/valkey:8-alpine' || '' }}
        command: --requirepass ${{ inputs.service_db_password }}
        ports:
          - 6380:6379
        options: >-
          --health-cmd "valkey-cli -a ${{ inputs.service_db_password }} -p 6379 ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      memcached:
        image: ${{ inputs.enable_memcached_service && 'memcached:1.6-alpine' || '' }}
        ports:
          - 11211:11211
      postgres:
        image: ${{ inputs.enable_postgres_service && 'postgres:16-alpine' || '' }}
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: ${{ inputs.service_db_name }}
          POSTGRES_USER: ${{ inputs.service_db_user }}
          POSTGRES_PASSWORD: ${{ inputs.service_db_password }}
        options: >-
          --health-cmd "pg_isready -U ${{ inputs.service_db_user }} -d ${{ inputs.service_db_name }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: ${{ inputs.enable_mysql_service && 'mysql:8.4' || '' }}
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: ${{ inputs.service_db_name }}
          MYSQL_USER: ${{ inputs.service_db_user }}
          MYSQL_PASSWORD: ${{ inputs.service_db_password }}
          MYSQL_ROOT_PASSWORD: ${{ inputs.service_db_password }}
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u${{ inputs.service_db_user }} -p${{ inputs.service_db_password }} --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      scylladb:
        image: ${{ inputs.enable_scylladb_service && 'scylladb/scylla:6.2' || '' }}
        command: --smp 1 --memory 1G --overprovisioned 1 --alternator-port 8000 --alternator-write-isolation only_rmw_uses_lwt
        ports:
          - 8000:8000
      elasticsearch:
        image: ${{ inputs.enable_elasticsearch_service && 'docker.elastic.co/elasticsearch/elasticsearch:8.17.3' || '' }}
        ports:
          - 9200:9200
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: -Xms512m -Xmx512m
      mongodb:
        image: ${{ inputs.enable_mongodb_service && 'mongo:7' || '' }}
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_DATABASE: ${{ inputs.service_db_name }}
          MONGO_INITDB_ROOT_USERNAME: ${{ inputs.service_db_user }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ inputs.service_db_password }}
    env:
      XDEBUG_MODE: off
      IC_SERVICE_DATABASE: ${{ inputs.service_db_name }}
      IC_SERVICE_USERNAME: ${{ inputs.service_db_user }}
      IC_SERVICE_PASSWORD: ${{ inputs.service_db_password }}
      IC_REDIS_HOST: 127.0.0.1
      IC_REDIS_PORT: ${{ inputs.enable_valkey_service && !inputs.enable_redis_service && '6380' || '6379' }}
      IC_REDIS_PASSWORD: ${{ inputs.service_db_password }}
      IC_VALKEY_HOST: 127.0.0.1
      IC_VALKEY_PORT: "6380"
      IC_VALKEY_PASSWORD: ${{ inputs.service_db_password }}
      IC_MEMCACHED_HOST: 127.0.0.1
      IC_MEMCACHED_PORT: "11211"
      IC_POSTGRES_DSN: pgsql:host=127.0.0.1;port=5432;dbname=${{ inputs.service_db_name }}
      IC_POSTGRES_USER: ${{ inputs.service_db_user }}
      IC_POSTGRES_PASSWORD: ${{ inputs.service_db_password }}
      IC_MYSQL_DSN: mysql:host=127.0.0.1;port=3306;dbname=${{ inputs.service_db_name }};charset=utf8mb4
      IC_MYSQL_USER: ${{ inputs.service_db_user }}
      IC_MYSQL_PASSWORD: ${{ inputs.service_db_password }}
      IC_SCYLLADB_HOST: 127.0.0.1
      IC_SCYLLADB_PORT: "8000"
      IC_SCYLLADB_ENDPOINT: http://127.0.0.1:8000
      IC_SCYLLADB_REGION: us-east-1
      IC_SCYLLADB_ACCESS_KEY_ID: ${{ inputs.service_db_user }}
      IC_SCYLLADB_SECRET_ACCESS_KEY: ${{ inputs.service_db_password }}
      IC_ELASTICSEARCH_HOST: 127.0.0.1
      IC_ELASTICSEARCH_PORT: "9200"
      IC_ELASTICSEARCH_URL: http://127.0.0.1:9200
      IC_MONGODB_HOST: 127.0.0.1
      IC_MONGODB_PORT: "27017"
      IC_MONGODB_DSN: mongodb://${{ inputs.service_db_user }}:${{ inputs.service_db_password }}@127.0.0.1:27017/${{ inputs.service_db_name }}?authSource=admin
    strategy:
      matrix:
        operating-system: [ "ubuntu-latest" ]
        php-versions: ${{ fromJson(needs.prepare.outputs.php_versions) }}
        dependency-version: ${{ fromJson(needs.prepare.outputs.dependency_versions) }}

    name: Code Analysis - PHP ${{ matrix.php-versions }} - ${{ matrix.dependency-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: composer:v2
          extensions: ${{ inputs.php_extensions }}
          ini-values: ${{ contains(inputs.php_extensions, 'apcu') && 'apc.enable_cli=1, apcu.enable_cli=1' || '' }}
          coverage: none

      - name: Check PHP Version
        run: php -v

      - name: Checkout workflow source
        if: inputs.enable_redis_service || inputs.enable_valkey_service || inputs.enable_memcached_service || inputs.enable_postgres_service || inputs.enable_mysql_service || inputs.enable_scylladb_service || inputs.enable_elasticsearch_service || inputs.enable_mongodb_service
        uses: actions/checkout@v6
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .phpforge-workflow
          sparse-checkout: |
            .github/scripts/verify-and-wait-services.sh
          sparse-checkout-cone-mode: false

      - name: Verify and wait optional services
        if: inputs.enable_redis_service || inputs.enable_valkey_service || inputs.enable_memcached_service || inputs.enable_postgres_service || inputs.enable_mysql_service || inputs.enable_scylladb_service || inputs.enable_elasticsearch_service || inputs.enable_mongodb_service
        shell: bash
        env:
          INPUT_ENABLE_REDIS_SERVICE: ${{ inputs.enable_redis_service }}
          INPUT_ENABLE_VALKEY_SERVICE: ${{ inputs.enable_valkey_service }}
          INPUT_ENABLE_MEMCACHED_SERVICE: ${{ inputs.enable_memcached_service }}
          INPUT_ENABLE_POSTGRES_SERVICE: ${{ inputs.enable_postgres_service }}
          INPUT_ENABLE_MYSQL_SERVICE: ${{ inputs.enable_mysql_service }}
          INPUT_ENABLE_SCYLLADB_SERVICE: ${{ inputs.enable_scylladb_service }}
          INPUT_ENABLE_ELASTICSEARCH_SERVICE: ${{ inputs.enable_elasticsearch_service }}
          INPUT_ENABLE_MONGODB_SERVICE: ${{ inputs.enable_mongodb_service }}
        run: bash .phpforge-workflow/.github/scripts/verify-and-wait-services.sh

      - name: Validate Composer
        run: |
          PACKAGE_NAME="$(composer config name --no-plugins --no-scripts 2>/dev/null || true)"

          if [ "${PACKAGE_NAME}" = "infocyph/phpforge" ]; then
            composer validate
          else
            composer validate --strict
          fi

      - name: Resolve dependencies (${{ matrix.dependency-version }})
        run: composer update --no-interaction --prefer-dist --no-progress --${{ matrix.dependency-version }} ${{ inputs.composer_flags }}

      - name: Test
        env:
          IC_PHPSTAN_MEMORY_LIMIT: ${{ inputs.phpstan_memory_limit }}
          IC_PSALM_THREADS: ${{ inputs.psalm_threads }}
          IC_PEST_FAIL_ON_SKIPPED: ${{ inputs.fail_on_skipped_tests }}
        run: |
          if [ "${{ matrix.dependency-version }}" != "prefer-lowest" ]; then
            composer ic:ci
          else
            if composer run-script --list 2>/dev/null | grep -qE '^[[:space:]]*ic:ci[[:space:]]'; then
              composer ic:ci -- --prefer-lowest
            else
              composer ic:ci --prefer-lowest
            fi
          fi

  analyze:
    needs: prepare
    if: inputs.run_analysis
    name: Security Analysis - PHP ${{ matrix.php-versions }}
    runs-on: ubuntu-latest
    env:
      XDEBUG_MODE: off
    strategy:
      matrix:
        php-versions: ${{ fromJson(needs.prepare.outputs.php_versions) }}
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: composer:v2
          extensions: ${{ inputs.php_extensions }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress ${{ inputs.composer_flags }}

      - name: Composer Audit
        id: composer_audit
        run: composer ic:release:audit
        continue-on-error: true

      - name: Quality Gate (PHPStan)
        id: quality_gate
        env:
          IC_PHPSTAN_MEMORY_LIMIT: ${{ inputs.phpstan_memory_limit }}
        run: composer ic:test:static
        continue-on-error: true

      - name: Security Gate (Psalm)
        id: security_gate
        env:
          IC_PSALM_THREADS: ${{ inputs.psalm_threads }}
        run: composer ic:test:security
        continue-on-error: true

      - name: Run PHPStan (Code Scanning)
        id: phpstan_scan
        run: |
          VENDOR_DIR="$(composer config vendor-dir)"
          PHPSTAN_CONFIG="$VENDOR_DIR/infocyph/phpforge/resources/phpstan.neon.dist"

          if [ -f "phpstan.neon" ]; then
            PHPSTAN_CONFIG="phpstan.neon"
          elif [ -f "phpstan.neon.dist" ]; then
            PHPSTAN_CONFIG="phpstan.neon.dist"
          elif [ -f "resources/phpstan.neon.dist" ]; then
            PHPSTAN_CONFIG="resources/phpstan.neon.dist"
          fi

          if [ ! -f "$PHPSTAN_CONFIG" ]; then
            echo "::error::PHPStan config not found: $PHPSTAN_CONFIG"
            exit 1
          fi

          PHPSTAN_ARGS=(analyse --configuration="$PHPSTAN_CONFIG" --memory-limit="${{ inputs.phpstan_memory_limit }}" --no-progress --error-format=json)

          php "$VENDOR_DIR/bin/phpstan" "${PHPSTAN_ARGS[@]}" > phpstan-results.json || true
          composer ic:phpstan:sarif -- phpstan-results.json phpstan-results.sarif
        continue-on-error: true

      - name: Upload PHPStan Results
        id: upload_phpstan
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: phpstan-results.sarif
          category: "phpstan-${{ matrix.php-versions }}"
        if: always() && hashFiles('phpstan-results.sarif') != ''

      - name: Run Psalm Security Scan
        id: psalm_scan
        run: |
          VENDOR_DIR="$(composer config vendor-dir)"
          PSALM_CONFIG="$VENDOR_DIR/infocyph/phpforge/resources/psalm.xml"
          if [ -f "psalm.xml" ]; then
            PSALM_CONFIG="psalm.xml"
          elif [ -f "psalm.xml.dist" ]; then
            PSALM_CONFIG="psalm.xml.dist"
          elif [ -f "resources/psalm.xml" ]; then
            PSALM_CONFIG="resources/psalm.xml"
          fi

          if [ ! -f "$PSALM_CONFIG" ]; then
            echo "::error::Psalm config not found: $PSALM_CONFIG"
            exit 1
          fi

          php "$VENDOR_DIR/bin/psalm" --config="$PSALM_CONFIG" --security-analysis --threads="${{ inputs.psalm_threads }}" --report=psalm-results.sarif || true
        continue-on-error: true

      - name: Upload Psalm Results
        id: upload_psalm
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: psalm-results.sarif
          category: "psalm-${{ matrix.php-versions }}"
        if: always() && hashFiles('psalm-results.sarif') != ''

      - name: Enforce analysis gates
        if: always()
        shell: bash
        run: |
          failures=()

          if [ "${{ steps.composer_audit.outcome }}" != "success" ]; then
            failures+=("composer audit")
          fi

          if [ "${{ steps.quality_gate.outcome }}" != "success" ]; then
            failures+=("phpstan quality gate")
          fi

          if [ "${{ steps.security_gate.outcome }}" != "success" ]; then
            failures+=("psalm security gate")
          fi

          if [ "${#failures[@]}" -gt 0 ]; then
            echo "::error::Security analysis checks failed: ${failures[*]}"
            exit 1
          fi

  benchmark:
    needs: prepare
    if: inputs.run_svg_report && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    name: Benchmark - PHP ${{ matrix.php-versions }}
    runs-on: ubuntu-latest
    env:
      XDEBUG_MODE: off
    strategy:
      matrix:
        php-versions: ${{ fromJson(needs.prepare.outputs.php_versions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: composer:v2
          extensions: ${{ inputs.php_extensions }}
          coverage: none

      - name: Resolve dependencies (prefer-stable)
        run: composer update --no-interaction --prefer-dist --no-progress --prefer-stable ${{ inputs.composer_flags }}

      - name: Checkout workflow source
        uses: actions/checkout@v6
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .phpforge-workflow
          sparse-checkout: |
            .github/scripts/run-benchmark.sh
          sparse-checkout-cone-mode: false

      - name: Run benchmark command
        id: run_benchmark
        shell: bash
        run: bash .phpforge-workflow/.github/scripts/run-benchmark.sh

      - name: Benchmark timing marker (command=${{ steps.run_benchmark.outputs.benchmark_command }}, duration=${{ steps.run_benchmark.outputs.duration_ms }} ms, metric_ns=${{ steps.run_benchmark.outputs.benchmark_metric_ns }}, metric_source=${{ steps.run_benchmark.outputs.benchmark_metric_source }})
        if: always()
        run: echo "Benchmark timing marker"

      - name: Prepare benchmark JSON artifact
        if: always()
        shell: bash
        run: |
          mkdir -p .phpforge-report

          if [ -f ".phpforge-report/benchmark-output.log" ]; then
            if jq -e . < ".phpforge-report/benchmark-output.log" >/dev/null 2>&1; then
              jq -c 'if type == "array" then . else [] end' < ".phpforge-report/benchmark-output.log" > ".phpforge-report/benchmark-results-php-${{ matrix.php-versions }}.json"
            else
              jq -R -s -c '
                (gsub("\r"; "") | gsub("\u001b\\[[0-9;]*[A-Za-z]"; "")) as $clean
                | [
                    $clean
                    | match("\\[\\{.*?\\}\\]"; "gm")
                    | .string
                  ]
                | map(fromjson? | select(type == "array"))
                | if length == 0 then [] else .[-1] end
              ' < ".phpforge-report/benchmark-output.log" > ".phpforge-report/benchmark-results-php-${{ matrix.php-versions }}.json"
            fi
          else
            echo '[]' > ".phpforge-report/benchmark-results-php-${{ matrix.php-versions }}.json"
          fi

      - name: Upload benchmark JSON artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-raw-php-${{ matrix.php-versions }}
          path: .phpforge-report/benchmark-results-php-${{ matrix.php-versions }}.json
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

  svg-report:
    needs:
      - run
      - analyze
      - benchmark
    if: always() && inputs.run_svg_report && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    name: Security SVG Report
    runs-on: ubuntu-latest
    env:
      XDEBUG_MODE: off
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve report PHP version
        id: report_php
        shell: bash
        run: |
          php_version="$(jq -r 'if type == "array" and length > 0 then .[-1] else empty end' <<< '${{ inputs.php_versions }}')"

          if [ -z "$php_version" ] || [ "$php_version" = "null" ]; then
            php_version="8.5"
          fi

          echo "php_version=${php_version}" >> "$GITHUB_OUTPUT"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ steps.report_php.outputs.php_version }}
          tools: composer:v2
          extensions: ${{ inputs.php_extensions }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress ${{ inputs.composer_flags }}

      - name: Checkout workflow source
        uses: actions/checkout@v6
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .phpforge-workflow
          sparse-checkout: |
            .github/scripts/build-security-report.sh
          sparse-checkout-cone-mode: false

      - name: Download benchmark JSON artifacts
        if: always()
        uses: actions/download-artifact@v7
        with:
          pattern: benchmark-raw-php-*
          path: .phpforge-report/in/benchmark
          merge-multiple: true

      - name: Build SVG report artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_RESULT: ${{ needs.run.result }}
          ANALYZE_RESULT: ${{ needs.analyze.result }}
          BENCHMARK_JOB_RESULT: ${{ needs.benchmark.result }}
          PHP_VERSIONS_INPUT: ${{ inputs.php_versions }}
        run: bash .phpforge-workflow/.github/scripts/build-security-report.sh
      - name: Upload security report artifacts
        uses: actions/upload-artifact@v7
        with:
          name: security-report
          path: |
            .phpforge-report/out/security-report.svg
            .phpforge-report/out/security-summary.json
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error
