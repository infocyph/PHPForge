name: "Security & Standards"

on:
  workflow_call:
    inputs:
      php_versions:
        description: "JSON array of PHP versions."
        required: false
        type: string
        default: '["8.3","8.4","8.5"]'
      dependency_versions:
        description: "JSON array of Composer dependency modes."
        required: false
        type: string
        default: '["prefer-lowest","prefer-stable"]'
      php_extensions:
        description: "Comma-separated PHP extensions for shivammathur/setup-php."
        required: false
        type: string
        default: ""
      coverage:
        description: "Coverage driver for shivammathur/setup-php."
        required: false
        type: string
        default: "none"
      composer_flags:
        description: "Extra flags appended to composer install/update."
        required: false
        type: string
        default: ""
      phpstan_memory_limit:
        description: "PHPStan memory limit."
        required: false
        type: string
        default: "1G"
      psalm_threads:
        description: "Psalm thread count."
        required: false
        type: string
        default: "1"
      run_analysis:
        description: "Run SARIF security/code-scanning analysis job."
        required: false
        type: boolean
        default: true

jobs:
  prepare:
    name: Prepare CI matrix
    runs-on: ubuntu-latest
    outputs:
      php_versions: ${{ steps.matrix.outputs.php_versions }}
      dependency_versions: ${{ steps.matrix.outputs.dependency_versions }}
    steps:
      - name: Define shared matrix values
        id: matrix
        run: |
          echo 'php_versions=${{ inputs.php_versions }}' >> "$GITHUB_OUTPUT"
          echo 'dependency_versions=${{ inputs.dependency_versions }}' >> "$GITHUB_OUTPUT"

  run:
    needs: prepare
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [ "ubuntu-latest" ]
        php-versions: ${{ fromJson(needs.prepare.outputs.php_versions) }}
        dependency-version: ${{ fromJson(needs.prepare.outputs.dependency_versions) }}

    name: Code Analysis - PHP ${{ matrix.php-versions }} - ${{ matrix.dependency-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: composer:v2
          extensions: ${{ inputs.php_extensions }}
          coverage: ${{ inputs.coverage }}

      - name: Check PHP Version
        run: php -v

      - name: Validate Composer
        run: composer validate --strict

      - name: Resolve dependencies (${{ matrix.dependency-version }})
        run: composer update --no-interaction --prefer-dist --no-progress --${{ matrix.dependency-version }} ${{ inputs.composer_flags }}

      - name: Test
        env:
          IC_PHPSTAN_MEMORY_LIMIT: ${{ inputs.phpstan_memory_limit }}
          IC_PSALM_THREADS: ${{ inputs.psalm_threads }}
        run: |
          if [ "${{ matrix.dependency-version }}" != "prefer-lowest" ]; then
            composer ic:ci
          else
            composer ic:ci --prefer-lowest
          fi

  analyze:
    needs: prepare
    if: inputs.run_analysis
    name: Security Analysis - PHP ${{ matrix.php-versions }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: ${{ fromJson(needs.prepare.outputs.php_versions) }}
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: composer:v2
          extensions: ${{ inputs.php_extensions }}
          coverage: ${{ inputs.coverage }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress ${{ inputs.composer_flags }}

      - name: Composer Audit
        run: composer ic:release:audit

      - name: Quality Gate (PHPStan)
        env:
          IC_PHPSTAN_MEMORY_LIMIT: ${{ inputs.phpstan_memory_limit }}
        run: composer ic:test:static

      - name: Security Gate (Psalm)
        env:
          IC_PSALM_THREADS: ${{ inputs.psalm_threads }}
        run: composer ic:test:security

      - name: Run PHPStan (Code Scanning)
        run: |
          VENDOR_DIR="$(composer config vendor-dir)"
          PHPSTAN_CONFIG="$VENDOR_DIR/infocyph/phpforge/phpstan.neon.dist"

          if [ -f "phpstan.neon.dist" ]; then
            PHPSTAN_CONFIG="phpstan.neon.dist"
          fi

          php "$VENDOR_DIR/bin/phpstan" analyse --configuration="$PHPSTAN_CONFIG" --memory-limit="${{ inputs.phpstan_memory_limit }}" --no-progress --error-format=json > phpstan-results.json || true
          composer ic:phpstan:sarif phpstan-results.json phpstan-results.sarif
        continue-on-error: true

      - name: Upload PHPStan Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: phpstan-results.sarif
          category: "phpstan-${{ matrix.php-versions }}"
        if: always() && hashFiles('phpstan-results.sarif') != ''

      - name: Run Psalm Security Scan
        run: |
          VENDOR_DIR="$(composer config vendor-dir)"
          PSALM_CONFIG="$VENDOR_DIR/infocyph/phpforge/psalm.xml"
          if [ -f "psalm.xml" ]; then
            PSALM_CONFIG="psalm.xml"
          fi

          php -d error_reporting=24575 "$VENDOR_DIR/bin/psalm" --config="$PSALM_CONFIG" --security-analysis --threads="${{ inputs.psalm_threads }}" --report=psalm-results.sarif || true
        continue-on-error: true

      - name: Upload Psalm Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: psalm-results.sarif
          category: "psalm-${{ matrix.php-versions }}"
        if: always() && hashFiles('psalm-results.sarif') != ''
