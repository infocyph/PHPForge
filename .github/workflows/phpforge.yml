name: "PHPForge"

on:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master", "develop", "development" ]

jobs:
  security-standards:
    uses: ./.github/workflows/security-standards.yml
    permissions:
      security-events: write
      actions: read
      contents: read
