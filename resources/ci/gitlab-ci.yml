stages:
  - quality

variables:
  IC_PHPSTAN_MEMORY_LIMIT: "1G"
  IC_PSALM_THREADS: "1"

phpforge:
  stage: quality
  image: composer:2
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - vendor/
      - .composer/cache/
  script:
    - composer install --no-interaction --prefer-dist --no-progress
    - composer ic:ci
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
